<div class="dialog-wrapper" *ngIf="dialog.state().isOpen" (keydown)="onKeyDown($event)">
    <div class="dialog-backdrop" @backdrop (click)="onCancel()"></div>

    <div class="dialog-container" @modal role="dialog" aria-modal="true"
        [attr.aria-labelledby]="'dialog-title-' + dialog.state().title">
        <div class="dialog-header">
            <h3 [id]="'dialog-title-' + dialog.state().title">{{ dialog.state().title }}</h3>
            <button class="btn-close" (click)="onCancel()" aria-label="Close dialog">
                <span class="material-icons" aria-hidden="true">close</span>
            </button>
        </div>

        <div class="dialog-body">
            <p>{{ dialog.state().message }}</p>

            @if (dialog.state().type === 'prompt') {
            <div class="field">
                <input #promptInput type="text" [(ngModel)]="promptValue" [placeholder]="'Enter value...'"
                    (keydown.enter)="onConfirm()" aria-label="Enter value">
            </div>
            }
        </div>

        <div class="dialog-actions">
            <button class="btn-secondary" (click)="onCancel()" aria-label="Cancel and close dialog">Cancel</button>
            <button [class]="dialog.state().isDanger ? 'btn-danger' : 'btn-primary'" (click)="onConfirm()"
                [attr.aria-label]="dialog.state().type === 'prompt' ? 'Confirm input' : 'Proceed with action'">
                {{ dialog.state().type === 'prompt' ? 'Confirm' : 'Yes, Proceed' }}
            </button>
        </div>
    </div>
</div>
