<aside class="properties">
    <div class="properties-header">
        <h2>Properties</h2>
        @if (editor.selectedElement(); as el) {
        <span class="selection-pill">{{ el.name }}</span>
        }
    </div>

    @if (editor.selectedElement(); as el) {
    <div class="properties-content">
        <div class="section">
            <h3>Identity</h3>
            <div class="field">
                <label>Name</label>
                <input type="text" [ngModel]="el.name" (ngModelChange)="editor.updateElement(el.id, { name: $event })">
                <div class="identity-info">
                    <span class="identity-badge">{{ el.type }}</span>
                    <span class="id-text">ID: {{ el.id.slice(0, 8) }}...</span>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Layout</h3>
            <div class="grid">
                <div class="field">
                    <label>X (Left)</label>
                    <input type="number" [ngModel]="el.styles.left"
                        (ngModelChange)="editor.updateStyles(el.id, { left: $event })">
                </div>
                <div class="field">
                    <label>Y (Top)</label>
                    <input type="number" [ngModel]="el.styles.top"
                        (ngModelChange)="editor.updateStyles(el.id, { top: $event })">
                </div>
                <div class="field">
                    <label>Width</label>
                    <input type="number" [ngModel]="el.styles.width"
                        (ngModelChange)="editor.updateStyles(el.id, { width: $event })">
                </div>
                <div class="field">
                    <label>Height</label>
                    <input type="number" [ngModel]="el.styles.height"
                        (ngModelChange)="editor.updateStyles(el.id, { height: $event })">
                </div>
                <div class="field" *ngIf="el.type === 'container' || el.type === 'rect'">
                    <label>Gap</label>
                    <input type="number" [ngModel]="el.styles.gap || 0"
                        (ngModelChange)="editor.updateStyles(el.id, { gap: $event })">
                </div>
                <div class="field" *ngIf="el.type === 'container' || el.type === 'rect'">
                    <label>Padding</label>
                    <input type="number" [ngModel]="el.styles.padding || 0"
                        (ngModelChange)="editor.updateStyles(el.id, { padding: $event })">
                </div>
            </div>

            <div class="field-group" *ngIf="el.type === 'container' || el.type === 'rect'">
                <label>Flex Distribution</label>
                <div class="flex-controls">
                    <select [ngModel]="el.styles.justifyContent || 'center'"
                        (ngModelChange)="editor.updateStyles(el.id, { justifyContent: $event })">
                        <option value="flex-start">Start</option>
                        <option value="center">Center</option>
                        <option value="flex-end">End</option>
                        <option value="space-between">Between</option>
                    </select>
                    <select [ngModel]="el.styles.alignItems || 'center'"
                        (ngModelChange)="editor.updateStyles(el.id, { alignItems: $event })">
                        <option value="flex-start">Top</option>
                        <option value="center">Middle</option>
                        <option value="flex-end">Bottom</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Typography</h3>
            <div class="grid">
                <div class="field">
                    <label>Font Size</label>
                    <input type="number" [ngModel]="el.styles.fontSize || 14"
                        (ngModelChange)="editor.updateStyles(el.id, { fontSize: $event })">
                </div>
                <div class="field">
                    <label>Weight</label>
                    <select [ngModel]="el.styles.fontWeight || 400"
                        (ngModelChange)="editor.updateStyles(el.id, { fontWeight: $event })">
                        <option value="300">Light</option>
                        <option value="400">Regular</option>
                        <option value="500">Medium</option>
                        <option value="600">Semi Bold</option>
                        <option value="700">Bold</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Appearance</h3>
            <div class="grid">
                <div class="field" *ngIf="el.type !== 'text'">
                    <label>Background</label>
                    <input type="color" [ngModel]="el.styles.backgroundColor"
                        (ngModelChange)="editor.updateStyles(el.id, { backgroundColor: $event })">
                </div>
                <div class="field">
                    <label>Text Color</label>
                    <input type="color" [ngModel]="el.styles.color"
                        (ngModelChange)="editor.updateStyles(el.id, { color: $event })">
                </div>
                <div class="field">
                    <label>Radius</label>
                    <input type="number" [ngModel]="el.styles.borderRadius || 0"
                        (ngModelChange)="editor.updateStyles(el.id, { borderRadius: $event })">
                </div>
                <div class="field">
                    <label>Border Width</label>
                    <input type="number" [ngModel]="el.styles.borderWidth || 0"
                        (ngModelChange)="editor.updateStyles(el.id, { borderWidth: $event })">
                </div>
                <div class="field">
                    <label>Border Color</label>
                    <input type="color" [ngModel]="el.styles.borderColor || '#cccccc'"
                        (ngModelChange)="editor.updateStyles(el.id, { borderColor: $event })">
                </div>
            </div>

            <div class="field" *ngIf="el.type === 'image'">
                <label>Image URL</label>
                <input type="text" [ngModel]="el.imageUrl" placeholder="https://..."
                    (ngModelChange)="editor.updateElement(el.id, { imageUrl: $event })">
            </div>

            <div class="field" *ngIf="el.type === 'input'">
                <label>Placeholder text</label>
                <input type="text" [ngModel]="el.placeholder" placeholder="Enter text..."
                    (ngModelChange)="editor.updateElement(el.id, { placeholder: $event })">
            </div>

            <div class="field" *ngIf="el.content !== undefined">
                <label>Content</label>
                <textarea [ngModel]="el.content"
                    (ngModelChange)="editor.updateElement(el.id, { content: $event })"></textarea>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-danger" (click)="editor.deleteElement(el.id)">Delete Element</button>
        </div>
    </div>
    } @else {
    <div class="properties-content">
        <div class="section">
            <h3>Canvas Settings</h3>
            <div class="field">
                <label class="checkbox-label">
                    <input type="checkbox" [ngModel]="editor.gridSettings().enabled"
                        (ngModelChange)="editor.updateGridSettings({ enabled: $event })">
                    Show Grid
                </label>
            </div>
            <div class="field">
                <label class="checkbox-label">
                    <input type="checkbox" [ngModel]="editor.gridSettings().snapEnabled"
                        (ngModelChange)="editor.updateGridSettings({ snapEnabled: $event })">
                    Snap to Grid
                </label>
            </div>

            <div class="grid">
                <div class="field">
                    <label>Grid X (Columns)</label>
                    <input type="number" [ngModel]="editor.gridSettings().sizeX"
                        (ngModelChange)="editor.updateGridSettings({ sizeX: $event })">
                </div>
                <div class="field">
                    <label>Grid Y (Rows)</label>
                    <input type="number" [ngModel]="editor.gridSettings().sizeY"
                        (ngModelChange)="editor.updateGridSettings({ sizeY: $event })">
                </div>
            </div>
        </div>

        <div class="empty-state">
            <p>Select an element to edit its specific properties</p>
        </div>
    </div>
    }
</aside>
