<nav class="navbar">
    <div class="logo">
        <span class="logo-icon">⚡</span>
        <h1>WireGen</h1>
    </div>
    <div class="project-info">
        <span class="project-name">{{ editor.project().name }}</span>
    </div>
    <div class="actions">
        <button class="btn btn-icon theme-toggle" (click)="editor.toggleTheme()"
            [title]="'Switch to ' + (editor.theme() === 'light' ? 'dark' : 'light') + ' mode'">
            <span class="material-icons">{{ editor.theme() === 'light' ? 'dark_mode' : 'light_mode' }}</span>
        </button>
        <button class="btn btn-outline" (click)="editor.clearProject()">Clear</button>
        <button class="btn btn-outline" (click)="exportService.previewProject()">Preview</button>
        <button class="btn btn-primary" (click)="onExport()">Export</button>
    </div>
</nav>
